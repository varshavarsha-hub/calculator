<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cal">
        <input type="text" placeholder="0"><br>
        <div >
            <button class="operator">(</button>
            <button class="operator">)</button>
            <button class="operator">%</button>
            <button class="operator">AC</button>
        </div>
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">/</button>
        </div>
        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">*</button>
        </div>
        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">-</button>
        </div>

        <div >
            <button class="operator">0</button>
            <button class="operator">.</button>
            <button class="operator">=</button>
            <button class="operator">+</button>
        </div>
    </div>
     <script src="script.js"></script>
</body>
</html>
